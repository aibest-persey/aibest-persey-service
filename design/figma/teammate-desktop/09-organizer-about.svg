<svg viewBox="0 0 1280 800" width="1280" height="800" xmlns="http://www.w3.org/2000/svg">
<defs><style>
text{font-family:Inter,Arial,sans-serif}
.tp{fill:#2B2A28}.tsx{fill:#6B6A64}.tm{fill:#9A9991}.white{fill:#FFFFFF}
.blue{fill:#5661F2}
.card{fill:#FFFFFF;stroke:#E8E6DF;stroke-width:1}
.ln{stroke:#E8E6DF;stroke-width:1}
.icoW{fill:none;stroke:#FFFFFF;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.ico{fill:none;stroke:#6B6A64;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.icoB{fill:none;stroke:#5661F2;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
</style></defs>
<rect width="1280" height="800" fill="#FFFFFF"/>
<rect x="0" y="0" width="1280" height="44" fill="#F4F2EC"/><line x1="0" y1="44" x2="1280" y2="44" class="ln"/>
<circle cx="22" cy="22" r="5" fill="#EB5757"/><circle cx="40" cy="22" r="5" fill="#F2C94C"/><circle cx="58" cy="22" r="5" fill="#27AE60"/>
<rect x="86" y="12" width="420" height="22" rx="7" class="card"/><text x="100" y="27" font-size="11" class="tm">events.school.edu/o/ashfak</text>
<circle cx="104" cy="120" r="32" fill="#C9CDFB"/>
<text x="150" y="114" font-size="19" font-weight="500" class="tp">Ashfak Sayem</text><text x="150" y="134" font-size="12.5" class="tsx">Organizer · Music club</text>
<text x="846" y="116" text-anchor="middle" font-size="16" font-weight="500" class="tp">350</text><text x="846" y="134" text-anchor="middle" font-size="11" class="tm">Following</text>
<line x1="906" y1="106" x2="906" y2="134" class="ln"/>
<text x="966" y="116" text-anchor="middle" font-size="16" font-weight="500" class="tp">346</text><text x="966" y="134" text-anchor="middle" font-size="11" class="tm">Followers</text>
<rect x="1026" y="104" width="100" height="38" rx="10" class="blue"/><circle cx="1050" cy="123" r="5" class="icoW"/><path d="M1042 134 a8 7 0 0 1 16 0" class="icoW"/><text x="1078" y="128" font-size="12.5" font-weight="500" class="white">Follow</text>
<rect x="1136" y="104" width="100" height="38" rx="10" class="card"/><path d="M1156 116 h14 v10 h-9 l-3 3 v-3 h-2 z" class="icoB"/><text x="1184" y="128" font-size="12.5" fill="#5661F2">Message</text>
