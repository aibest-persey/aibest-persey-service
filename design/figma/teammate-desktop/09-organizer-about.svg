<text x="148" y="200" font-size="13.5" class="tsx">Event</text>
<text x="228" y="200" font-size="13.5" class="tsx">Reviews</text>
<line x1="64" y1="212" x2="1216" y2="212" class="ln"/>
<text x="64" y="250" font-size="13" class="tsx">Enjoy your favorite events and a lovely time with friends and family. We host live</text>
<text x="64" y="270" font-size="13" class="tsx">concerts, music nights, and seasonal festivals across campus. Tap follow to never miss</text>
<text x="64" y="290" font-size="13" class="tsx">an event, and turn on notifications for early-bird tickets.</text>
