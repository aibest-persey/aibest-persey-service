<svg viewBox="0 0 1280 800" width="1280" height="800" xmlns="http://www.w3.org/2000/svg">
<defs><style>
text{font-family:Inter,Arial,sans-serif}
.tp{fill:#2B2A28}.tsx{fill:#6B6A64}.tm{fill:#9A9991}.white{fill:#FFFFFF}.wd{fill:#D9DCFE}
.blue{fill:#5661F2}
.field{fill:#FAF9F6;stroke:#E8E6DF;stroke-width:1}
.focus{fill:#FAF9F6;stroke:#5661F2;stroke-width:1.5}
.card{fill:#FFFFFF;stroke:#E8E6DF;stroke-width:1}
.ln{stroke:#E8E6DF;stroke-width:1}
.ico{fill:none;stroke:#6B6A64;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.icoB{fill:none;stroke:#5661F2;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.icoM{fill:none;stroke:#9A9991;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
</style></defs>
<rect width="1280" height="800" fill="#FFFFFF"/>
<rect x="0" y="0" width="1280" height="44" fill="#F4F2EC"/><line x1="0" y1="44" x2="1280" y2="44" class="ln"/>
<circle cx="22" cy="22" r="5" fill="#EB5757"/><circle cx="40" cy="22" r="5" fill="#F2C94C"/><circle cx="58" cy="22" r="5" fill="#27AE60"/>
<rect x="86" y="12" width="420" height="22" rx="7" class="card"/><text x="100" y="27" font-size="11" class="tm">events.school.edu/sign-in</text>
<rect x="0" y="44" width="460" height="756" class="blue"/>
<rect x="48" y="86" width="32" height="32" rx="9" fill="#FFFFFF" fill-opacity="0.2"/><rect x="62.5" y="92" width="3" height="20" rx="1.5" class="white"/><rect x="54" y="100.5" width="20" height="3" rx="1.5" class="white"/>
<text x="92" y="108" font-size="16" font-weight="500" class="white">Eventized</text>
<text x="48" y="350" font-size="30" font-weight="500" class="white">Discover every</text>
<text x="48" y="390" font-size="30" font-weight="500" class="white">event at your school.</text>
<text x="48" y="436" font-size="14" class="wd">Concerts, clubs, sports and more —</text>
<text x="48" y="458" font-size="14" class="wd">all in one place.</text>
<rect x="48" y="500" width="26" height="6" rx="3" class="white"/><rect x="80" y="500" width="8" height="6" rx="3" fill="#FFFFFF" fill-opacity="0.5"/><rect x="94" y="500" width="8" height="6" rx="3" fill="#FFFFFF" fill-opacity="0.5"/>
<text x="700" y="172" font-size="24" font-weight="500" class="tp">Sign in</text>
<text x="700" y="198" font-size="13" class="tsx">Welcome back, please enter your details</text>
<text x="700" y="244" font-size="12" class="tsx">Email</text>
<rect x="700" y="254" width="380" height="46" rx="10" class="field"/>
<rect x="716" y="270" width="16" height="12" rx="2" class="ico"/><path d="M716 272 l8 6 8 -6" class="ico"/><text x="742" y="281" font-size="13" class="tp">alex@school.edu</text>
<text x="700" y="328" font-size="12" class="tsx">Password</text>
<rect x="700" y="338" width="380" height="46" rx="10" class="focus"/>
<rect x="716" y="360" width="14" height="12" rx="2.5" class="icoB"/><path d="M719 360 v-2 a4 4 0 0 1 8 0 v2" class="icoB"/><text x="742" y="367" font-size="15" letter-spacing="2" class="tp">••••••••</text>
<path d="M1050 366 q6 -5 12 0 q-6 5 -12 0" class="icoM"/><circle cx="1056" cy="366" r="1.6" class="icoM"/>
<rect x="700" y="404" width="32" height="18" rx="9" class="blue"/><circle cx="724" cy="413" r="6.5" class="white"/><text x="742" y="418" font-size="12" class="tsx">Remember me</text>
<text x="1080" y="418" text-anchor="end" font-size="12" fill="#5661F2">Forgot password?</text>
<rect x="700" y="440" width="380" height="48" rx="10" class="blue"/><text x="890" y="470" text-anchor="middle" font-size="14" font-weight="500" class="white">Sign in</text>
<line x1="700" y1="516" x2="868" y2="516" class="ln"/><line x1="912" y1="516" x2="1080" y2="516" class="ln"/><text x="890" y="520" text-anchor="middle" font-size="11" class="tm">or</text>
<rect x="700" y="538" width="380" height="46" rx="10" class="card"/><text x="858" y="566" font-size="15" font-weight="600" fill="#5661F2">G</text><text x="890" y="566" text-anchor="middle" font-size="13" class="tp">Sign in with Google</text>
<text x="780" y="616" font-size="12.5" class="tsx">Don't have an account?</text><text x="922" y="616" font-size="12.5" font-weight="500" fill="#5661F2">Sign up</text>
</svg>
